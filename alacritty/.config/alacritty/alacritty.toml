general.import = [
  "~/.config/alacritty/catppuccin-mocha.toml",
]

[window]
padding = { x = 10, y = 10 }
opacity = 1.0
decorations = "none"

[font]
size = 11.0

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[cursor]
style = { shape = "Block", blinking = "On" }
