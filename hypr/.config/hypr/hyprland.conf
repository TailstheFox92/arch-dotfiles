$mod = SUPER

monitor = DP-2,1920x1080@239.76,1080x1080,1
monitor = DP-1,1920x1080@60,3000x1080,1
monitor = HDMI-A-1,1920x1080@74.99,0x1080,1,transform,3
monitor = HDMI-A-2,1920x1080@60,1080x0,1

workspace = 1, monitor:DP-2, default:true
workspace = 2, monitor:DP-1, default:true
workspace = 3, monitor:HDMI-A-1, default:true
workspace = 4, monitor:HDMI-A-2, default:true

env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Ice
env = GTK_THEME,catppuccin-mocha-lavender-standard
env = QT_QPA_PLATFORMTHEME,qt5ct

exec-once = waybar
exec-once = swaybg -i ~/.local/share/backgrounds/default-wallpaper.jpg -m fill
exec-once = systemctl --user start hyprpolkitagent

input {
  kb_layout = us
}

general {
  gaps_in = 5
  gaps_out = 8
  border_size = 2
  col.active_border = rgb(cba6f7)
  col.inactive_border = rgb(45475a)
  layout = dwindle
}

decoration {
  rounding = 8
}

animations {
  enabled = false
}

bind = $mod, Return, exec, alacritty
bind = $mod, D, exec, rofi -show drun
bind = $mod SHIFT, P, exec, rofi-powermenu
bind = $mod SHIFT, L, exec, lock-screen
bind = $mod SHIFT, D, exec, vesktop
bind = $mod, E, exec, thunar
bind = $mod, W, exec, brave
bind = $mod SHIFT, B, exec, blueman-manager
bind = $mod SHIFT, Q, killactive
bind = $mod, Left, movefocus, l
bind = $mod, Right, movefocus, r
bind = $mod, Up, movefocus, u
bind = $mod, Down, movefocus, d
bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d
bind = $mod SHIFT, Left, movewindow, l
bind = $mod SHIFT, Right, movewindow, r
bind = $mod SHIFT, Up, movewindow, u
bind = $mod SHIFT, Down, movewindow, d
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, J, movewindow, d
bind = $mod, F, fullscreen
bind = $mod, V, togglefloating
bind = $mod SHIFT, space, togglefloating
bind = $mod SHIFT, C, exec, hyprctl reload
bind = $mod, minus, togglespecialworkspace, scratchpad
bind = $mod SHIFT, minus, movetoworkspace, special:scratchpad
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10
bind = , XF86AudioRaiseVolume, exec, volume-up-notify
bind = , XF86AudioLowerVolume, exec, volume-down-notify
bind = , XF86AudioMute, exec, volume-mute-toggle-notify
bind = , XF86AudioMicMute, exec, pamixer --default-source -t
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioPause, exec, playerctl pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86MonBrightnessUp, exec, brightness-up-notify
bind = , XF86MonBrightnessDown, exec, brightness-down-notify
bind = , Print, exec, screenshot-full
bind = SHIFT, Print, exec, screenshot-region
bind = CTRL, Print, exec, screenshot-region-edit
bind = ALT, Print, exec, screenshot-window

bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

windowrule = workspace 1, match:class ^(Alacritty)$
windowrule = workspace 2, match:class ^(Brave-browser)$
windowrule = workspace 2, match:class ^(firefox)$
windowrule = workspace 3, match:class ^(vesktop)$
windowrule = workspace 3, match:class ^(discord)$
windowrule = workspace 4, match:class ^(thunar)$
windowrule = workspace 5, match:class ^(Steam)$
windowrule = workspace 6, match:class ^(code|Code)$
windowrule = workspace 10, match:class ^(pavucontrol)$
windowrule = workspace 10, match:class ^(blueman-manager)$

windowrule = tile 1, match:class ^(Steam)$
windowrule = float 1, match:title ^(Friends List)$
windowrule = float 1, match:title ^(Properties - .*)$
windowrule = float 1, match:title ^(.* - Properties)$
windowrule = float 1, match:title ^(.*Properties.*)$
windowrule = float 1, match:title ^(Settings)$
windowrule = float 1, match:title ^(Screenshot Uploader)$
windowrule = float 1, match:title ^(Steam Guard)$
windowrule = float 1, match:title ^(.* - Chat)$
windowrule = float 1, match:class ^(steamwebhelper)$
windowrule = float 1, match:class ^(vrmonitor|vrstartup|vrcompositor|vrserver)$
windowrule = float 1, match:title ^(SteamVR.*|.*SteamVR.*Status.*)$
